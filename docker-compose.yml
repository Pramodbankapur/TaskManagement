services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost/api
    ports:
      - "80:80"
    depends_on:
      - server
